# ─── Test Profile — H2 In-Memory ─────────────────────────────────────────────
# Profil ini dipakai saat menjalankan `mvnw test`
# Database H2 dibuat fresh di memori setiap test run — tidak perlu Supabase.

spring.datasource.url=jdbc:h2:mem:skillbridge_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: skema dibuat otomatis dari entity saat test mulai, dihapus setelah selesai
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── Flyway — NONAKTIF saat test ──────────────────────────────────────────────
# Skema dihandle oleh Hibernate ddl-auto=create-drop
spring.flyway.enabled=false

# ─── JWT (nilai dummy untuk test) ─────────────────────────────────────────────
skillbridge.app.jwtSecret=TestSecretKeyForJUnitTestingOnlyDoNotUseInProductionEnvironmentEverAtAll123456
skillbridge.app.jwtExpirationMs=86400000
skillbridge.app.jwtRefreshExpirationMs=604800000

# ─── CORS ─────────────────────────────────────────────────────────────────────
skillbridge.cors.allowed-origins=http://localhost:5173
